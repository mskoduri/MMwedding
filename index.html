<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<script>
// Guest name from URL
const params = new URLSearchParams(window.location.search);
const guest = params.get("guest");
if (guest) {
  document.getElementById("guestText").innerText =
    "Dear " + guest + ", you're invited!";
}

// Enter site
function enterSite() {
  document.getElementById("welcome").style.display = "none";
  document.getElementById("main").style.display = "block";
  document.getElementById("music").play();
}

// Countdown
const date = new Date("May 13, 2026").getTime();
setInterval(()=>{
  let now = new Date().getTime();
  let diff = date - now;
  let days = Math.floor(diff/(1000*60*60*24));
  document.getElementById("countdown").innerText = days + " days to go";
},1000);

// RSVP
function rsvp() {
  let name = document.getElementById("name").value;
  if(name===""){
    document.getElementById("msg").innerText="Enter your name!";
  } else {
    document.getElementById("msg").innerText="Thanks "+name+" 🎉";
  }
}
</script>

</body>
